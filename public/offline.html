<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne · Cosme Check</title>
    <style>
      :root { color-scheme: light only; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #FAFAFA;
        color: #1F2937;
        padding: 24px;
      }
      .card {
        max-width: 440px;
        text-align: center;
        background: #fff;
        border-radius: 24px;
        padding: 36px 28px;
        box-shadow: 0 8px 28px -12px rgba(15,23,42,0.10);
      }
      h1 { font-size: 22px; margin: 0 0 8px; letter-spacing: -0.01em; }
      p { color: #6B7280; line-height: 1.5; margin: 8px 0 0; }
      .icon {
        width: 56px; height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #FB7185, #F472B6);
        display: inline-flex; align-items: center; justify-content: center;
        margin-bottom: 16px;
      }
      button {
        margin-top: 18px;
        background: linear-gradient(180deg, #FB7185, #F472B6);
        color: #fff;
        border: 0;
        border-radius: 12px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3h6"/>
          <path d="M10 3v7.5L4.5 19a2 2 0 0 0 1.7 3h11.6a2 2 0 0 0 1.7-3L14 10.5V3"/>
          <path d="M7.5 14h9"/>
        </svg>
      </div>
      <h1>Tu es hors ligne</h1>
      <p>Connecte-toi à Internet pour analyser un nouveau produit. Tes dernières analyses restent disponibles depuis l&apos;historique.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
